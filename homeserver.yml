- name: Configure homeserver (ucore)
  hosts: homeserver
  remote_user: core
  vars:
    compose_base_path: "/home/core/compose-files"
    docker_override_path: "/etc/systemd/system/docker.service.d"

  pre_tasks:
    - name: Put SELinux in permissive mode
      become: true
      ansible.posix.selinux:
        policy: targeted
        state: permissive

    - name: Use directory structure for compose files
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ compose_base_path }}"
        - "{{ compose_base_path }}/docker"

    - name: Copy secrets file
      ansible.builtin.copy:
        decrypt: true
        src: secrets.env
        dest: "{{ compose_base_path }}/secrets.env"
        mode: "0600" # Secrets should be restrictive

  tasks:
    - name: Enable tailscale
      become: true
      ansible.builtin.systemd_service:
        name: tailscaled
        state: started
        enabled: true

    - name: Create docker.service override directory
      become: true
      ansible.builtin.file:
        path: "{{ docker_override_path }}"
        state: directory
        mode: "0755"

    - name: Configure docker.service mount dependency override
      become: true
      ansible.builtin.copy:
        dest: "{{ docker_override_path }}/override.conf"
        mode: "0644"
        content: |
          [Unit]
          RequiresMountsFor=/mnt/homelab_iscsi /mnt/media
          After=network-online.target mnt-homelab_iscsi.mount mnt-media.mount
          Wants=network-online.target
      notify: Reload systemd

    - name: Manage Docker services
      become: true
      ansible.builtin.systemd_service:
        name: "{{ item.name }}"
        enabled: "{{ item.enabled }}"
        state: "{{ item.state }}"
      loop:
        - { name: "docker.socket", enabled: false, state: "stopped" }
        - { name: "docker.service", enabled: true, state: "started" }

    - name: Install and configure CIFS
      ansible.builtin.include_tasks:
        file: homeserver/tasks/cifs.yml

    - name: Copy compose files
      ansible.builtin.copy:
        src: homeserver/docker/
        dest: "{{ compose_base_path }}/docker/"
        mode: "0644"

    - name: Ensure core user is in docker group
      become: true
      ansible.builtin.user:
        name: core
        groups: docker
        append: true
      register: user_group_update
      notify: Reboot server

    - name: Flush handlers if reboot required
      ansible.builtin.meta: flush_handlers

    - name: Create docker networks
      community.docker.docker_network:
        name: "{{ item }}"
      loop:
        - web
        - internal

    - name: Setup containers
      community.docker.docker_compose_v2:
        project_name: homeserver
        project_src: "{{ compose_base_path }}/docker"
        files:
          - compose.yml
        env_files:
          - "{{ compose_base_path }}/secrets.env"
        remove_orphans: true

  handlers:
    - name: Reload systemd
      become: true
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Reboot server
      become: true
      ansible.builtin.reboot:
        msg: "Rebooting to apply docker group membership"
